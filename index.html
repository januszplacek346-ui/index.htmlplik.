<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PRO AIM TRAINER FPS + SHOP</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #1a1c23; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; user-select: none; }
        
        #menu { background: #242734; padding: 30px; border-radius: 20px; margin-top: 20px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); border: 2px solid #00d2ff; display: inline-block; position: relative; width: 450px; z-index: 10; }
        #descBox { background: #1a1c23; padding: 15px; border-radius: 10px; border: 1px solid #ff0055; margin-top: 15px; font-size: 14px; min-height: 20px; }
        
        .btn-pro { background: linear-gradient(45deg, #ff0055, #ff5500); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 8px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
        .btn-pro:hover { transform: scale(1.05); box-shadow: 0 0 15px #ff0055; }
        .btn-duel { background: linear-gradient(45deg, #00d2ff, #0066ff); }
        .btn-duel:hover { box-shadow: 0 0 15px #00d2ff; }
        
        .shop-box { background: #1a1c23; border: 1px solid #00d2ff; border-radius: 10px; padding: 15px; margin-top: 20px; }
        .skin-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #242734; }
        .skin-btn { background: #00d2ff; color: #1a1c23; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .skin-btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .skin-master { background: linear-gradient(45deg, #b000ff, #00ffcc); color: black; animation: glowPulse 1.5s infinite alternate; }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px #b000ff; }
            100% { box-shadow: 0 0 15px #00ffcc; }
        }

        /* Obszar Gry */
        #gameArea { 
            width: 800px; 
            height: 500px; 
            border: 4px solid #00d2ff; 
            margin: 10px auto; 
            position: relative; 
            background: #242734; 
            display: none; 
            overflow: hidden; 
            cursor: crosshair; 
        }
        
        #gun-container {
            position: absolute;
            bottom: -10px; 
            right: 180px; 
            pointer-events: none; 
            z-index: 5;
            transition: transform 0.1s ease-out;
        }
        
        #fps-gun {
            width: 150px; 
            height: auto;
            transition: transform 0.04s ease-out; 
            transform-origin: bottom center; 
        }
        
        .recoil {
            transform: translateY(-25px) scale(1.15) rotate(-2deg); 
        }

        .target { width: 40px; height: 40px; background: radial-gradient(circle, #00d2ff, #0066ff); position: absolute; border-radius: 8px; box-shadow: 0 0 10px #00d2ff; z-index: 2; }
        
        .muzzle-flash { position: absolute; width: 60px; height: 60px; background: radial-gradient(circle, #fff, #ffcc00, transparent); border-radius: 50%; pointer-events: none; animation: flash 0.1s forwards; z-index: 3; }
        @keyframes flash { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }

        #uiBar { font-size: 22px; margin-top: 10px; font-weight: bold; display: none; background: #242734; padding: 15px 30px; border-radius: 10px; border: 1px solid #00d2ff; }
        #duelScoreBar { font-size: 20px; margin-top: 5px; font-weight: bold; display: none; color: #ff0055; }
        
        table { border-collapse: collapse; width: 350px; margin: 20px auto; background: #242734; color: white; border-radius: 10px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #1a1c23; }
        th { background-color: #00d2ff; color: #1a1c23; font-weight: bold; }
        
        input, select { background: #1a1c23; color: white; border: 1px solid #00d2ff; padding: 10px; border-radius: 5px; text-align: center; font-size: 16px; margin-bottom: 10px; }
        .balance-text { color: #ffcc00; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .player-name-display { font-size: 20px; color: #00ffcc; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; border-bottom: 2px dashed #00d2ff; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div id="uiBar">
        Czas: <span id="timer">20</span>s | Combo: <span id="combo">0</span> | Wynik: <span id="score">0</span> | Amunicja: ∞
    </div>
    <div id="duelScoreBar">Przeciwnik: <span id="oppScore">0</span></div>

    <!-- MENU GŁÓWNE -->
    <div id="menu">
        <h1>PRO AIM TRAINER</h1>
        
        <!-- Tu wyświetla się zablokowany nick -->
        <div id="lockedUsernameDisplay" class="player-name-display" style="display:none;"></div>

        <div class="balance-text">Twoje Punkty: <span id="totalBalance">0</span> pkt</div>

        <!-- Input do wpisania nicku (tylko na początku) -->
        <input type="text" id="username" placeholder="Wpisz swój Nick (tylko raz!)"><br>

        <select id="diff" onchange="updateDesc()">
            <option value="1000">Łatwy</option>
            <option value="700">Średni</option>
            <option value="400">Trudny</option>
            <option value="impossible">Niemożliwy</option>
        </select>
        <div id="descBox">Łatwy: Spokojne tempo, kostki znikają po 0.7s.</div><br>
        
        <button class="btn-pro" onclick="startGame('solo')">GRAJ SAM</button>
        <button class="btn-pro btn-duel" onclick="showDuelMenu()">TRYB ONLINE (DUEL)</button>

        <div id="duel-options" style="display:none; margin-top:10px; border-top: 1px solid #00d2ff; padding-top:10px;">
            <button class="btn-pro btn-duel" onclick="initDuelHost()">STWÓRZ POKÓJ</button>
            <p id="roomCodeDisplay" style="color:#00d2ff; font-weight:bold;"></p>
            <input type="text" id="joinCode" placeholder="Wpisz kod pokoju"><br><br>
            <button class="btn-pro btn-duel" onclick="joinDuelRoom()">DOŁĄCZ DO POKOJU</button>
        </div>

        <!-- SKLEP ZE SKINAMI -->
        <div class="shop-box">
            <h3>SKLEP ZE SKINAMI</h3>
            <div class="skin-item">
                <span>Klasyczny Czarny</span>
                <button class="skin-btn" id="btn-skin-default" onclick="equipSkin('default')">Użyj</button>
            </div>
            <div class="skin-item">
                <span>Złoty Skin (50 pkt)</span>
                <button class="skin-btn" id="btn-skin-gold" onclick="buyOrEquip('gold', 50)">Kup</button>
            </div>
            <div class="skin-item">
                <span>Neonowy Cyberpunk (100 pkt)</span>
                <button class="skin-btn" id="btn-skin-neon" onclick="buyOrEquip('neon', 100)">Kup</button>
            </div>
            <div class="skin-item">
                <span>Krwawy Rubin (150 pkt)</span>
                <button class="skin-btn" id="btn-skin-ruby" onclick="buyOrEquip('ruby', 150)">Kup</button>
            </div>
            <div class="skin-item" style="border-top: 1px dashed #b000ff; padding-top: 10px;">
                <span style="color: #00ffcc; font-weight: bold;">💎 SKIN MISTRZA 💎</span>
                <button class="skin-btn skin-master" id="btn-skin-master" onclick="buyOrEquip('master', 1000)">Kup (1000)</button>
            </div>
        </div>
    </div>

    <!-- Obszar gry -->
    <div id="gameArea" onmousedown="shootEffect(event)">
        <div id="gun-container">
            <svg id="fps-gun" viewBox="0 0 200 200">
                <polygon points="70,190 130,190 120,110 80,110" fill="#1b1c1e" />
                <polygon points="80,110 120,110 110,40 90,40" fill="#2c2e35" />
                <polygon points="70,190 80,110 90,40 75,45" fill="#121315" />
                <rect x="98" y="34" width="4" height="6" fill="#00ffff" />
                <rect x="82" y="104" width="6" height="6" fill="#ff0055" />
                <rect x="112" y="104" width="6" height="6" fill="#ff0055" />
                <line x1="88" y1="140" x2="112" y2="140" stroke="#000" stroke-width="3" />
                <line x1="90" y1="160" x2="110" y2="160" stroke="#000" stroke-width="3" />
            </svg>
        </div>
    </div>
    
    <div id="results" style="display:none;">
        <h2 id="msg"></h2>
        <h3 id="rankInfo"></h3>
        <table id="scoreTable">
            <thead><tr><th>Miejsce</th><th>Gracz</th><th>Wynik</th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="btn-pro" onclick="location.reload()">Zagraj ponownie</button>
        <!-- Przycisk Wyczyść Ranking został usunięty stąd -->
    </div>

    <script>
        let score = 0, combo = 0, timeLeft = 20, timerInterval, playerName;
        let activeTargets = 0, gameMode = 'solo';
        let peer, conn;

        let balance = parseInt(localStorage.getItem('aim_balance') || "0");
        let ownedSkins = JSON.parse(localStorage.getItem('aim_skins') || '["default"]');
        let equippedSkin = localStorage.getItem('aim_equipped') || 'default';
        let savedUsername = localStorage.getItem('aim_username') || "";

        // SPRAWDZANIE ZAPISANEGO NICKU NA STARCIE
        function checkUsernameUI() {
            if (savedUsername) {
                document.getElementById('username').style.display = 'none';
                let displayDiv = document.getElementById('lockedUsernameDisplay');
                displayDiv.innerText = "Gracz: " + savedUsername;
                displayDiv.style.display = 'block';
            }
        }

        function updateDesc() {
            const val = document.getElementById('diff').value;
            const descs = {
                "1000": "Łatwy: Spokojne tempo, kostki znikają po 0.7s.",
                "700": "Średni: Szybsze tempo, kostki znikają po 0.5s.",
                "400": "Trudny: Błyskawiczny refleks, kostki znikają po 0.35s.",
                "impossible": "Niemożliwy: Dwie kostki naraz, znikają po 0.3s!"
            };
            document.getElementById('descBox').innerText = descs[val];
        }

        function showDuelMenu() { document.getElementById('duel-options').style.display = 'block'; }

        // Ruch bronią za myszką
        document.getElementById('gameArea').addEventListener('mousemove', (e) => {
            const rect = document.getElementById('gameArea').getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const container = document.getElementById('gun-container');
            const offset = (mouseX - 400) / 15; 
            container.style.transform = `translateX(${offset}px)`;
        });

        // Efekt odrzutu
        function shootEffect(e) {
            const gunImg = document.getElementById('fps-gun');
            gunImg.classList.add('recoil');
            setTimeout(() => gunImg.classList.remove('recoil'), 70);

            if (e.target.id === "gameArea" || e.target.classList.contains("target")) {
                const flash = document.createElement("div");
                flash.className = "muzzle-flash";
                const rect = document.getElementById("gameArea").getBoundingClientRect();
                flash.style.left = (e.clientX - rect.left - 30) + "px";
                flash.style.top = (e.clientY - rect.top - 30) + "px";
                document.getElementById("gameArea").appendChild(flash);
                setTimeout(() => flash.remove(), 70);
            }
        }

        // System Sklepu
        function updateShopUI() {
            document.getElementById('totalBalance').innerText = balance;
            const skins = ['default', 'gold', 'neon', 'ruby', 'master'];
            skins.forEach(skin => {
                const btn = document.getElementById('btn-skin-' + skin);
                if (skin === equippedSkin) {
                    btn.innerText = "Używany";
                    btn.disabled = true;
                } else if (ownedSkins.includes(skin)) {
                    btn.innerText = "Użyj";
                    btn.disabled = false;
                } else {
                    if(skin !== 'master') btn.innerText = "Kup";
                    btn.disabled = false;
                }
            });
        }

        function buyOrEquip(skinName, price) {
            if (ownedSkins.includes(skinName)) {
                equipSkin(skinName);
            } else {
                if (balance >= price) {
                    balance -= price;
                    ownedSkins.push(skinName);
                    localStorage.setItem('aim_balance', balance);
                    localStorage.setItem('aim_skins', JSON.stringify(ownedSkins));
                    equipSkin(skinName);
                    alert("💎 Odblokowałeś elitarny skin!");
                } else {
                    alert("Brakuje Ci punktów! Graj dalej, aby zarobić na ten skin.");
                }
            }
        }

        function equipSkin(skinName) {
            equippedSkin = skinName;
            localStorage.setItem('aim_equipped', skinName);
            applySkinFilter(skinName);
            updateShopUI();
        }

        function applySkinFilter(skinName) {
            const gun = document.getElementById('fps-gun');
            if (skinName === 'default') gun.style.filter = "none";
            else if (skinName === 'gold') gun.style.filter = "sepia(1) saturate(7) hue-rotate(15deg) brightness(1.1) contrast(1.2)";
            else if (skinName === 'neon') gun.style.filter = "hue-rotate(140deg) saturate(6) brightness(1.3) drop-shadow(0 0 8px #00f2ff)";
            else if (skinName === 'ruby') gun.style.filter = "hue-rotate(330deg) saturate(8) brightness(0.9) contrast(1.3) drop-shadow(0 0 8px #ff0055)";
            else if (skinName === 'master') gun.style.filter = "hue-rotate(260deg) saturate(9) brightness(1.4) contrast(1.4) drop-shadow(0 0 15px #b000ff)";
        }

        // Multiplayer Duel
        function initDuelHost() {
            if(!validateAndSaveUsername()) return;
            let randId = "ROOM-" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(randId);
            peer.on('open', (id) => document.getElementById('roomCodeDisplay').innerText = "TWÓJ KOD: " + id + "\nWyślij go koledze!");
            peer.on('connection', (connection) => {
                conn = connection; setupChat(); alert("Gracz dołączył!");
                startGame('duel'); conn.send({type: 'start', diff: document.getElementById('diff').value});
            });
        }

        function joinDuelRoom() {
            if(!validateAndSaveUsername()) return;
            let code = document.getElementById('joinCode').value.trim().toUpperCase();
            peer = new Peer();
            peer.on('open', () => { conn = peer.connect(code); setupChat(); });
        }

        function setupChat() {
            conn.on('data', (data) => {
                if(data.type === 'start') { document.getElementById('diff').value = data.diff; updateDesc(); startGame('duel'); }
                if(data.type === 'score') { document.getElementById('oppScore').innerText = data.value; }
            });
        }
        
        // ZAPISYWANIE NICKU
        function validateAndSaveUsername() {
            if (!savedUsername) {
                let inputVal = document.getElementById('username').value.trim();
                if (!inputVal) {
                    alert("Musisz wpisać swój nick przed pierwszą grą!");
                    return false;
                }
                savedUsername = inputVal;
                localStorage.setItem('aim_username', savedUsername);
                checkUsernameUI();
            }
            playerName = savedUsername;
            return true;
        }

        // Silnik Rozgrywki
        function startGame(mode) {
            if(!validateAndSaveUsername()) return;
            
            gameMode = mode;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('uiBar').style.display = 'block';
            document.getElementById('gameArea').style.display = 'block';
            if(gameMode === 'duel') document.getElementById('duelScoreBar').style.display = 'block';
            
            applySkinFilter(equippedSkin);

            timerInterval = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
            maintainTargets();
        }

        function maintainTargets() {
            const mode = document.getElementById('diff').value;
            const needed = (mode === 'impossible') ? 2 : 1;
            if (activeTargets < needed && timeLeft > 0) createTarget();
            if(timeLeft > 0) requestAnimationFrame(maintainTargets);
        }

        function createTarget() {
            activeTargets++;
            const t = document.createElement('div');
            t.className = 'target';
            t.style.left = Math.random() * 750 + 'px';
            t.style.top = Math.random() * 340 + 'px'; 
            
            let clicked = false;
            t.onmousedown = (e) => { 
                clicked = true; combo++; score += 1; updateUI(); activeTargets--; t.remove(); 
                if(gameMode === 'duel' && conn) conn.send({type: 'score', value: score});
            };
            
            document.getElementById('gameArea').appendChild(t);
            
            const mode = document.getElementById('diff').value;
            let lifetime = 700; 
            if (mode === "700") lifetime = 500; 
            if (mode === "400") lifetime = 350; 
            if (mode === "impossible") lifetime = 300; 

            setTimeout(() => { 
                if(t.parentElement) { 
                    if (!clicked) { combo = 0; updateUI(); }
                    activeTargets--; t.remove(); 
                } 
            }, lifetime); 
        }

        function updateUI() {
            document.getElementById('combo').innerText = combo;
            document.getElementById('score').innerText = score;
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('uiBar').style.display = 'none';
            document.getElementById('duelScoreBar').style.display = 'none';
            document.getElementById('results').style.display = 'block';

            balance += score;
            localStorage.setItem('aim_balance', balance);

            const diffKey = document.getElementById('diff').value;
            let scores = JSON.parse(localStorage.getItem('scores_' + diffKey) || "[]");
            
            // SYSTEM BEZ DUPLIKATÓW W RANKINGU
            let existingPlayerIndex = scores.findIndex(s => s.name === playerName);
            if (existingPlayerIndex !== -1) {
                // Jeśli gracz już jest, zaktualizuj wynik tylko jeśli jest LEPSZY
                if (score > scores[existingPlayerIndex].score) {
                    scores[existingPlayerIndex].score = score;
                }
            } else {
                // Jeśli gracza nie ma na liście, dodaj go
                scores.push({name: playerName, score: score});
            }
            
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem('scores_' + diffKey, JSON.stringify(scores));

            let myRank = scores.findIndex(s => s.name === playerName) + 1;
            
            if(gameMode === 'duel') {
                let oppFinal = parseInt(document.getElementById('oppScore').innerText);
                if(score > oppFinal) document.getElementById('msg').innerText = `WYGRAŁEŚ! Wynik: ${score} do ${oppFinal}`;
                else if(score < oppFinal) document.getElementById('msg').innerText = `PRZEGRAŁEŚ! Wynik: ${score} do ${oppFinal}`;
                else document.getElementById('msg').innerText = `REMIS! Obaj mieliście wynik: ${score}`;
            } else {
                document.getElementById('msg').innerText = `Koniec gry! Wynik: ${score} (Zarobiłeś +${score} pkt!)`;
                document.getElementById('rankInfo').innerText = "Zajmujesz " + myRank + " miejsce w rankingu.";
            }

            let tbody = document.querySelector("#scoreTable tbody");
            tbody.innerHTML = scores.slice(0, 20).map((s, i) => 
                `<tr><td>${i+1}</td><td>${s.name}</td><td>${s.score}</td></tr>`
            ).join('');
        }

        checkUsernameUI();
        updateShopUI();
        updateDesc();
    </script>
</body>
</html>
